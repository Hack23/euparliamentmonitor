name: SLSA Provenance

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for manual build (e.g., v1.0.0)"
        required: false
        type: string

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Attest
    permissions:
      id-token: write # For SLSA provenance
      contents: write # For uploading release assets
      attestations: write # For build attestations
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Cache dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Generate news content
        run: |
          # Generate news for all languages
          npm run generate-news -- --types=week-ahead --languages=all || true
          npm run generate-news-indexes || true
          npm run generate-sitemap || true
        env:
          USE_EP_MCP: "false" # Use placeholder content for reproducible builds

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Create distribution archive
        run: |
          mkdir -p dist
          tar -czf dist/euparliamentmonitor-${{ steps.version.outputs.version }}.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='test' \
            --exclude='e2e' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='builds' \
            --exclude='.husky' \
            index*.html \
            news/ \
            sitemap.xml \
            styles.css \
            scripts/ \
            package.json \
            package-lock.json \
            LICENSE \
            README.md \
            SECURITY.md \
            SECURITY_ARCHITECTURE.md \
            CONTRIBUTING.md

      - name: Generate SBOM
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          npx @cyclonedx/cyclonedx-npm --output-file dist/sbom.json

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/euparliamentmonitor-*.tar.gz"

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "dist/euparliamentmonitor-*.tar.gz"
          sbom-path: "dist/sbom.json"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.6.2
        with:
          name: euparliamentmonitor-${{ steps.version.outputs.version }}
          path: |
            dist/euparliamentmonitor-*.tar.gz
            dist/sbom.json
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            dist/euparliamentmonitor-*.tar.gz
            dist/sbom.json
          tag_name: ${{ github.event.release.tag_name }}
