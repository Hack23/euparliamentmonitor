name-template: "EU Parliament Monitor $RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"

# Categories match exactly with PR labels from labeler.yml
categories:
  - title: "🚀 New Features"
    labels:
      - "feature"
      - "enhancement"

  - title: "🌍 EU Parliament Integration"
    labels:
      - "mcp-integration"
      - "news"
      - "content"

  - title: "🌐 Multi-language Support"
    labels:
      - "i18n"
      - "translation"

  - title: "🎨 UI/UX Improvements"
    labels:
      - "ui"
      - "design"
      - "style"

  - title: "🏗️ Infrastructure & Performance"
    labels:
      - "infrastructure"
      - "performance"
      - "config"

  - title: "🔄 Code Quality & Refactoring"
    labels:
      - "refactor"
      - "testing"

  - title: "🔒 Security & Compliance"
    labels:
      - "security"

  - title: "📝 Documentation"
    labels:
      - "documentation"

  - title: "📦 Dependencies"
    labels:
      - "dependencies"
      - "javascript"
      - "github_actions"

  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"

  - title: "🧪 Test Coverage Improvements"
    labels:
      - "test-coverage-impact"
      - "needs-tests"
      - "e2e"

  - title: "🤖 Custom Agent Updates"
    labels:
      - "agents"
      - "agent-task"
      - "agent-news"
      - "agent-frontend"
      - "agent-data"
      - "agent-devops"
      - "agent-security"
      - "agent-docs"
      - "agent-quality"

  - title: "⚙️ Component Updates"
    labels:
      - "workflows"
      - "scripts"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&' # Escape markdown special characters

template: |
  ## What's Changed

  $CHANGES

  ## 📊 Release Metrics & Evidence

  [![Test Coverage](https://img.shields.io/badge/Coverage-Reports-green?logo=vitest&style=for-the-badge)](https://euparliamentmonitor.com/docs/coverage/)
  [![API Documentation](https://img.shields.io/badge/API-Documentation-blue?logo=typescript&style=for-the-badge)](https://euparliamentmonitor.com/docs/api/)
  [![E2E Tests](https://img.shields.io/badge/E2E-Playwright_Reports-green?logo=playwright&style=for-the-badge)](https://euparliamentmonitor.com/docs/playwright-report/)

  All test reports, coverage metrics, and API documentation are generated during build and available in the [Documentation Hub](https://euparliamentmonitor.com/docs/).

  ## 🏛️ Architecture & Documentation

  | Document | Description |
  |----------|-------------|
  | [Architecture](https://github.com/Hack23/euparliamentmonitor/blob/main/ARCHITECTURE.md) | C4 architecture models and system overview |
  | [Security Architecture](https://github.com/Hack23/euparliamentmonitor/blob/main/SECURITY_ARCHITECTURE.md) | Security design and controls |
  | [Threat Model](https://github.com/Hack23/euparliamentmonitor/blob/main/THREAT_MODEL.md) | STRIDE threat analysis |
  | [Data Model](https://github.com/Hack23/euparliamentmonitor/blob/main/DATA_MODEL.md) | Data structures and relationships |
  | [Flowchart](https://github.com/Hack23/euparliamentmonitor/blob/main/FLOWCHART.md) | Process flows with security controls |
  | [State Diagram](https://github.com/Hack23/euparliamentmonitor/blob/main/STATEDIAGRAM.md) | State transitions and lifecycles |
  | [Mindmap](https://github.com/Hack23/euparliamentmonitor/blob/main/MINDMAP.md) | Conceptual relationships |
  | [SWOT Analysis](https://github.com/Hack23/euparliamentmonitor/blob/main/SWOT.md) | Strategic analysis |
  | [CRA Assessment](https://github.com/Hack23/euparliamentmonitor/blob/main/CRA-ASSESSMENT.md) | Cyber Resilience Act assessment |
  | [API Documentation](https://euparliamentmonitor.com/docs/api/) | TypeDoc-generated API reference |

  ## 🔐 Security & Supply Chain Protection

  [![SLSA 3](https://slsa.dev/images/gh-badge-level3.svg)](https://github.com/Hack23/euparliamentmonitor/attestations)
  [![OpenSSF Scorecard](https://api.securityscorecards.dev/projects/github.com/Hack23/euparliamentmonitor/badge)](https://scorecard.dev/viewer/?uri=github.com/Hack23/euparliamentmonitor)
  [![OpenSSF Best Practices](https://www.bestpractices.dev/projects/12068/badge)](https://www.bestpractices.dev/projects/12068)

  This release includes:
  - ✅ **SLSA Build Provenance Attestations** — Cryptographically signed build provenance
  - ✅ **Software Bill of Materials (SBOM)** — Complete dependency inventory in SPDX format
  - ✅ **npm Provenance** — Verified package publishing with attestation
  - ✅ **CodeQL Security Scanning** — Automated vulnerability detection
  - ✅ **Dependency Scanning** — Continuous vulnerability monitoring with Dependabot

  **Verify attestations:**
  ```bash
  gh attestation verify euparliamentmonitor-$RESOLVED_VERSION.zip -R Hack23/euparliamentmonitor
  npm audit signatures
  ```

  **Browse attestations:** [View all attestations](https://github.com/Hack23/euparliamentmonitor/attestations/)

  ## 📋 ISMS Compliance & Policies

  [![Hack23 ISMS](https://img.shields.io/badge/Hack23-ISMS-blue?logo=shield&style=for-the-badge)](https://github.com/Hack23/ISMS-PUBLIC)
  [![Information Security Policy](https://img.shields.io/badge/Policy-Information_Security-blue?logo=shield&style=for-the-badge)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Information_Security_Policy.md)
  [![Open Source Policy](https://img.shields.io/badge/Policy-Open_Source-blue?logo=opensource&style=for-the-badge)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Open_Source_Policy.md)
  [![Secure Development](https://img.shields.io/badge/Policy-Secure_Development-blue?logo=github&style=for-the-badge)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Secure_Development_Policy.md)

  ### Compliance Frameworks

  [![ISO 27001:2022](https://img.shields.io/badge/ISO-27001:2022-purple?style=flat-square)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Secure_Development_Policy.md)
  [![NIST CSF 2.0](https://img.shields.io/badge/NIST-CSF_2.0-orange?style=flat-square)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Secure_Development_Policy.md)
  [![CIS Controls v8.1](https://img.shields.io/badge/CIS-Controls_v8.1-red?style=flat-square)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Secure_Development_Policy.md)

  EU Parliament Monitor follows [Hack23 AB's comprehensive ISMS](https://github.com/Hack23/ISMS-PUBLIC) with defense-in-depth architecture and documented security controls.

  ## 📦 Release Artifacts

  | Artifact | Description | Verification |
  |----------|-------------|--------------|
  | `euparliamentmonitor-$RESOLVED_VERSION.zip` | Full application package | SHA-256 checksum, SLSA attestation |
  | `euparliamentmonitor-$RESOLVED_VERSION.spdx.json` | SBOM (SPDX format) | SBOM attestation |
  | `*.intoto.jsonl` | SLSA attestations | `gh attestation verify` |
  | npm package | `euparliamentmonitor@$RESOLVED_VERSION` | `npm audit signatures` |

  All artifacts are signed and attested using GitHub's SLSA Level 3 build provenance.

  ## 🚀 Deployment

  - **Primary**: https://euparliamentmonitor.com
  - **Documentation**: https://euparliamentmonitor.com/docs/
  - **API Docs**: https://euparliamentmonitor.com/docs/api/
  - **npm**: https://www.npmjs.com/package/euparliamentmonitor

  ## 🏗️ Built With

  - **Node.js**: 25.x
  - **TypeScript**: 5.9.x
  - **Chart.js**: 4.5.x
  - **D3.js**: 7.9.x
  - **Vitest**: 4.x
  - **Playwright**: 1.x
  - **European Parliament MCP Server**: 1.x

  ## 👥 Contributors

  $CONTRIBUTORS

  **Full Changelog**: https://github.com/Hack23/euparliamentmonitor/compare/$PREVIOUS_TAG...$RESOLVED_VERSION

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "feature"
      - "enhancement"
      - "news"
      - "mcp-integration"
      - "i18n"
  patch:
    labels:
      - "bug"
      - "fix"
      - "security"
      - "dependencies"
      - "documentation"
      - "performance"
      - "refactor"
  default: patch
